<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇹 Italian Adventure!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --salmon: #F2B5A0;
  --salmon-dark: #E8997F;
  --road: #F5ECD8;
  --road-border: #EAD9BE;
  --river: #8CC8D8;
  --river-dark: #6AAEC0;
  --green-tree: #7BBF5A;
  --green-dark: #5A9A3A;
  --building-cream: #F5E8C8;
  --building-warm: #E8C898;
  --building-red: #D4705A;
  --building-pink: #E89888;
  --text-dark: #4A2E1A;
  --text-med: #7A5030;
  --white-cloud: #FFF8F0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
}

body {
  font-family: 'Nunito', sans-serif;
  background: #C8604A;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* The whole app lives inside a scaled wrapper */
#app-root {
  display: flex;
  flex-direction: column;
  background: var(--salmon);
  position: relative;
  /* Width & height set dynamically by JS to fill viewport while keeping aspect */
  width: 100%;
  height: 100%;
  /* On very small / very tall screens we allow scroll as a fallback */
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}

/* ===== HEADER ===== */
.app-header {
  background: #C8604A;
  padding: 0 16px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
}
.app-title {
  font-family: 'Fredoka One', cursive;
  color: #fff;
  font-size: 1.4em;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  letter-spacing: 0.5px;
}
.score-strip { display: flex; align-items: center; gap: 10px; }
.score-pill {
  background: rgba(255,255,255,0.22);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 50px;
  padding: 3px 12px;
  font-family: 'Fredoka One', cursive;
  color: #fff;
  font-size: 0.9em;
}

/* ===== CITY TABS ===== */
.city-tabs {
  display: flex;
  flex-shrink: 0;
  background: #B85540;
  border-bottom: 3px solid #A04030;
}
.city-tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  cursor: pointer;
  font-family: 'Fredoka One', cursive;
  font-size: 1em;
  color: rgba(255,255,255,0.65);
  border-bottom: 4px solid transparent;
  transition: all 0.2s;
  user-select: none;
  letter-spacing: 0.5px;
}
.city-tab.active { color: #fff; border-bottom-color: #FFD166; background: rgba(0,0,0,0.12); }
.city-tab:hover:not(.active) { color: rgba(255,255,255,0.85); }

/* ===== MAP STAGE ===== */
.map-stage {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0; /* important: lets flex child shrink */
}
.city-view {
  position: absolute;
  inset: 0;
  transition: opacity 0.4s, transform 0.4s;
}
.city-view.hidden { opacity: 0; pointer-events: none; transform: scale(0.98); }

.map-svg { width: 100%; height: 100%; display: block; }

/* ===== LANDMARK GROUPS ===== */
.landmark-hit {
  cursor: pointer;
}
.landmark-hit:hover .building-body { filter: brightness(1.08); }

/* Label backgrounds */
.lbl-bg {
  rx: 6;
  fill: rgba(255,255,255,0.85);
}

/* Pulse dot */
.pulse-dot {
  animation: pulseDot 2s ease-in-out infinite;
  transform-origin: center;
}
@keyframes pulseDot {
  0%,100% { r: 7; opacity: 0.9; }
  50% { r: 11; opacity: 0.4; }
}
.visited-dot { display: none; }
.landmark-hit.done .pulse-dot { display: none; }
.landmark-hit.done .visited-dot { display: block; }

/* ===== SLIDE-UP PANEL ===== */
.panel-wrap {
  position: absolute;
  inset: 0;
  z-index: 30;
  pointer-events: none;
}
.panel-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0);
  transition: background 0.35s;
  pointer-events: none;
}
.panel-backdrop.open {
  background: rgba(0,0,0,0.28);
  pointer-events: all;
}
.landmark-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #FFF8F2;
  border-radius: 26px 26px 0 0;
  box-shadow: 0 -6px 40px rgba(0,0,0,0.22);
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.34,1.4,0.64,1);
  pointer-events: all;
  /* Design-space px, NOT vh — the app is CSS-transform scaled so vh is the real viewport */
  max-height: 455px;
  display: flex;
  flex-direction: column;
}
.landmark-panel.open { transform: translateY(0); }

/* Scrollable content inside the panel */
.panel-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 18px 24px;
  -webkit-overflow-scrolling: touch;
}

.panel-handle {
  width: 38px; height: 5px;
  background: #ddd;
  border-radius: 50px;
  margin: 12px auto 8px;
  flex-shrink: 0;
}
.panel-close {
  position: absolute;
  top: 10px; right: 16px;
  width: 32px; height: 32px;
  background: #eee;
  border: none;
  border-radius: 50%;
  font-size: 1em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  z-index: 2;
}
.panel-close:hover { background: #ddd; }

.panel-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.panel-icon { font-size: 2.8em; line-height: 1; flex-shrink: 0; }
.panel-name {
  font-family: 'Fredoka One', cursive;
  font-size: 1.45em;
  line-height: 1.2;
}
.panel-desc { font-size: 0.82em; color: #888; font-weight: 700; margin-top: 3px; }

/* ===== WORD TILES ===== */
.words-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  margin-bottom: 12px;
}
@media(max-width:400px){ .words-grid{ grid-template-columns:1fr; } }

.word-tile {
  background: #fff;
  border: 2.5px solid #eee;
  border-radius: 16px;
  padding: 12px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.word-tile:hover { transform: scale(1.04); border-color: #ccc; }
.word-tile.learned { background: #f0fff5; border-color: #5AAA78; }
.word-tile.learned::after { content: '⭐'; position: absolute; top:5px; right:7px; font-size:0.9em; }

.tile-emoji { font-size: 1.9em; display: block; margin-bottom: 5px; }
.tile-ita { font-family: 'Fredoka One', cursive; font-size: 1.2em; color: #C8604A; display: block; }
.tile-eng { font-size: 0.78em; color: #777; font-weight: 800; display: block; margin-top: 2px; }
.tile-pron { font-size: 0.7em; color: #aaa; font-style: italic; display: block; margin-top: 2px; }
.tile-hear {
  margin-top: 7px;
  background: #C8604A;
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 4px 13px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.75em;
  cursor: pointer;
  transition: transform 0.15s;
}
.tile-hear:hover { transform: scale(1.1); }

/* Phrase tiles */
.phrase-tile {
  grid-column: span 2;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 11px;
}
.phrase-tile .tile-emoji { flex-shrink: 0; margin-bottom: 0; }
.phrase-tile .tile-info { flex: 1; }
.phrase-tile .tile-ita { font-size: 1.05em; }
.phrase-tile .tile-hear { margin-top: 4px; }
@media(max-width:400px){ .phrase-tile{ grid-column: span 1; } }

/* ===== PROGRESS HINT ===== */
.progress-hint {
  text-align: center;
  padding: 10px 14px;
  background: #F5ECD8;
  border-radius: 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.88em;
  color: #8A6040;
  margin-bottom: 10px;
}

/* ===== QUIZ ===== */
.quiz-box {
  background: linear-gradient(135deg, #FFF0E8, #FFE4D4);
  border: 2.5px solid #E8A080;
  border-radius: 20px;
  padding: 15px;
}
.quiz-box h3 {
  font-family: 'Fredoka One', cursive;
  color: #C8604A;
  font-size: 1.05em;
  margin-bottom: 11px;
  display: flex; align-items: center; gap: 6px;
}
.quiz-q {
  background: #fff;
  border-radius: 14px;
  padding: 13px;
  text-align: center;
  margin-bottom: 11px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.quiz-q-emoji { font-size: 2em; display: block; margin-bottom: 4px; }
.quiz-q-text { font-family: 'Fredoka One', cursive; font-size: 1.15em; color: #333; }
.quiz-q-hint { font-size: 0.75em; color: #aaa; font-weight: 700; margin-top: 3px; }

.quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.quiz-opt {
  background: #fff;
  border: 2.5px solid #ddd;
  border-radius: 13px;
  padding: 10px 8px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.18s;
  text-align: center;
  color: #444;
}
.quiz-opt:hover:not(:disabled) { border-color: #C8604A; color: #C8604A; transform: scale(1.04); }
.quiz-opt.opt-ok { background: #d4edda; border-color: #5AAA78; color: #2A7A4A; animation: optBounce 0.4s; }
.quiz-opt.opt-no { background: #fde0da; border-color: #C8604A; color: #C8604A; animation: optShake 0.4s; }
.quiz-opt:disabled { cursor: default; }

@keyframes optBounce { 0%{transform:scale(1)} 40%{transform:scale(1.1)} 100%{transform:scale(1)} }
@keyframes optShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.quiz-fb {
  border-radius: 12px;
  padding: 10px 13px;
  text-align: center;
  margin-top: 9px;
  font-family: 'Fredoka One', cursive;
  font-size: 0.95em;
  animation: fadeUp 0.3s;
}
.quiz-fb.ok { background: #d4edda; color: #2A7A4A; border: 2px solid #5AAA78; }
.quiz-fb.no { background: #fde0da; color: #C8604A; border: 2px solid #C8604A; }
.quiz-next {
  display: block; width: 100%; margin-top: 9px;
  background: #C8604A; color: #fff; border: none;
  border-radius: 50px; padding: 11px;
  font-family: 'Fredoka One', cursive; font-size: 0.97em;
  cursor: pointer; transition: all 0.18s;
  box-shadow: 0 3px 12px rgba(200,96,74,0.35);
}
.quiz-next:hover { transform: scale(1.03); }

.quiz-done {
  background: linear-gradient(135deg, #FFF8E0, #FFF0B8);
  border: 2.5px solid #FFD166;
  border-radius: 20px;
  padding: 18px;
  text-align: center;
}
.quiz-done h3 { font-family: 'Fredoka One', cursive; color: #C89020; font-size: 1.2em; }
.quiz-done .star-row { font-size: 1.8em; letter-spacing: 4px; margin: 8px 0; }

@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ===== STARBURST ===== */
.starburst {
  position: absolute; pointer-events: none; z-index: 999;
  font-size: 2em;
  animation: burst 0.85s forwards;
}
@keyframes burst {
  0%{transform:scale(0.2);opacity:1}
  60%{transform:scale(1.4) translateY(-35px);opacity:1}
  100%{transform:scale(1) translateY(-75px);opacity:0}
}

/* ===== INTRO ===== */
#intro {
  position: absolute; inset: 0; z-index: 200;
  background: linear-gradient(160deg, #C8604A 0%, #B84838 45%, #D4705A 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 28px;
  transition: opacity 0.6s, transform 0.6s;
}
#intro.gone { opacity:0; transform:scale(1.07); pointer-events:none; }
.intro-flag { font-size: 4.5em; animation: floatY 2s ease-in-out infinite; }
@keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.intro-h1 { font-family:'Fredoka One',cursive; color:#fff; font-size:2.6em; text-shadow:2px 3px 0 rgba(0,0,0,0.2); margin:12px 0 8px; }
.intro-sub { color:rgba(255,255,255,0.88); font-size:1em; font-weight:700; max-width:300px; line-height:1.6; }
.intro-cities { display:flex; gap:12px; margin:18px 0; flex-wrap:wrap; justify-content:center; }
.intro-city {
  background: rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.35);
  border-radius:16px; padding:10px 18px;
  color:#fff; font-family:'Fredoka One',cursive; font-size:0.92em;
}
.intro-btn {
  background: #FFD166; color: #5A2E10;
  border: none; border-radius: 50px; padding: 14px 46px;
  font-family: 'Fredoka One', cursive; font-size: 1.5em;
  cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.25);
  transition: transform 0.2s;
}
.intro-btn:hover { transform: scale(1.06) rotate(-1deg); }
</style>
</head>
<body>

<div id="app-root">
<!-- INTRO -->
<div id="intro">
  <div class="intro-flag">🇮🇹</div>
  <h1 class="intro-h1">Italian Adventure!</h1>
  <p class="intro-sub">Explore Rome & Florence and learn Italian along the way!</p>
  <div class="intro-cities">
    <div class="intro-city">🏛️ Roma<br><small>Italian Words</small></div>
    <div class="intro-city">🌸 Firenze<br><small>Travel Phrases</small></div>
  </div>
  <button class="intro-btn" onclick="startApp()">Andiamo! ✈️</button>
</div>

<!-- HEADER -->
<div class="app-header">
  <div class="app-title">🇮🇹 Italian Adventure!</div>
  <div class="score-strip">
    <div class="score-pill">⭐ <span id="star-count">0</span></div>
    <div class="score-pill">✅ <span id="done-count">0</span></div>
  </div>
</div>

<!-- TABS -->
<div class="city-tabs">
  <div class="city-tab active" id="tab-rome" onclick="switchCity('rome')">🏛️ Roma</div>
  <div class="city-tab" id="tab-florence" onclick="switchCity('florence')">🌸 Firenze</div>
</div>

<!-- MAP STAGE -->
<div class="map-stage">

  <!-- ============================================================ ROME ============================================================ -->
  <div class="city-view" id="view-rome">
    <svg class="map-svg" viewBox="0 0 800 540" preserveAspectRatio="xMidYMid slice">
      <defs>
        <filter id="dropshadow" x="-15%" y="-15%" width="130%" height="130%">
          <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(100,50,20,0.22)"/>
        </filter>
        <!-- subtle texture on background -->
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <circle cx="10" cy="10" r="1" fill="rgba(180,100,70,0.1)"/>
        </pattern>
      </defs>

      <!-- BG -->
      <rect width="800" height="540" fill="#F2B5A0"/>
      <rect width="800" height="540" fill="url(#dots)"/>

      <!-- TITLE -->
      <text x="700" y="65" font-family="Fredoka One, cursive" font-size="52" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">Roma</text>

      <!-- Italian flag -->
      <rect x="620" y="75" width="12" height="28" rx="1" fill="#009246"/>
      <rect x="632" y="75" width="12" height="28" rx="1" fill="#fff"/>
      <rect x="644" y="75" width="12" height="28" rx="1" fill="#CE2B37"/>
      <rect x="619" y="72" width="2" height="36" fill="#8B6030"/>

      <!-- CLOUDS -->
      <g opacity="0.75">
        <ellipse cx="90" cy="48" rx="40" ry="16" fill="var(--white-cloud)"/>
        <ellipse cx="65" cy="54" rx="26" ry="13" fill="var(--white-cloud)"/>
        <ellipse cx="118" cy="54" rx="28" ry="12" fill="var(--white-cloud)"/>
      </g>
      <g opacity="0.75">
        <ellipse cx="360" cy="32" rx="34" ry="14" fill="var(--white-cloud)"/>
        <ellipse cx="338" cy="38" rx="22" ry="11" fill="var(--white-cloud)"/>
        <ellipse cx="386" cy="38" rx="24" ry="10" fill="var(--white-cloud)"/>
      </g>
      <!-- seagulls -->
      <path d="M150,60 Q155,55 160,60" stroke="#E8A0888" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M165,52 Q170,47 175,52" stroke="#E8A088" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M500,45 Q505,40 510,45" stroke="#E8A088" stroke-width="1.5" fill="none" opacity="0.5"/>

      <!-- ======= ROADS ======= -->
      <!-- Main diagonal roads - cream colored like reference -->
      <!-- Horizontal road center -->
      <path d="M0,300 Q200,290 400,295 Q600,300 800,290" stroke="#F5ECD8" stroke-width="28" fill="none" stroke-linecap="round"/>
      <path d="M0,300 Q200,290 400,295 Q600,300 800,290" stroke="#EAD9BE" stroke-width="30" fill="none" stroke-linecap="round"/>
      <path d="M0,300 Q200,290 400,295 Q600,300 800,290" stroke="#F5ECD8" stroke-width="26" fill="none" stroke-linecap="round"/>
      <!-- Diagonal road top-left to center -->
      <path d="M0,180 Q150,220 300,280 Q400,310 500,360" stroke="#EAD9BE" stroke-width="30" fill="none" stroke-linecap="round"/>
      <path d="M0,180 Q150,220 300,280 Q400,310 500,360" stroke="#F5ECD8" stroke-width="26" fill="none" stroke-linecap="round"/>
      <!-- Road top right -->
      <path d="M800,160 Q650,200 500,260 Q420,290 350,320" stroke="#EAD9BE" stroke-width="28" fill="none" stroke-linecap="round"/>
      <path d="M800,160 Q650,200 500,260 Q420,290 350,320" stroke="#F5ECD8" stroke-width="24" fill="none" stroke-linecap="round"/>
      <!-- Bottom roads -->
      <path d="M100,540 Q200,460 350,400 Q450,360 550,380" stroke="#EAD9BE" stroke-width="26" fill="none" stroke-linecap="round"/>
      <path d="M100,540 Q200,460 350,400 Q450,360 550,380" stroke="#F5ECD8" stroke-width="22" fill="none" stroke-linecap="round"/>
      <path d="M700,540 Q680,470 620,420 Q570,380 500,360" stroke="#EAD9BE" stroke-width="24" fill="none" stroke-linecap="round"/>
      <path d="M700,540 Q680,470 620,420 Q570,380 500,360" stroke="#F5ECD8" stroke-width="20" fill="none" stroke-linecap="round"/>

      <!-- ======= FIUME TEVERE (river) ======= -->
      <path d="M 160,0 Q 170,80 155,160 Q 140,240 130,310 Q 120,370 110,430 Q 100,490 95,540"
            stroke="#7DBFCF" stroke-width="42" fill="none" stroke-linecap="round"/>
      <path d="M 160,0 Q 170,80 155,160 Q 140,240 130,310 Q 120,370 110,430 Q 100,490 95,540"
            stroke="#8CC8D8" stroke-width="36" fill="none" stroke-linecap="round"/>
      <!-- river label -->
      <text x="88" y="290" font-family="Fredoka One, cursive" font-size="13" fill="rgba(255,255,255,0.85)"
            transform="rotate(-82, 88, 290)" text-anchor="middle">Fiume Tevere</text>

      <!-- ======= DECORATIVE TREES ======= -->
      <!-- scatter of round flat trees like reference -->
      <g id="trees-rome">
        <!-- top area trees -->
        <circle cx="255" cy="110" r="13" fill="#7BBF5A" opacity="0.9"/>
        <circle cx="270" cy="118" r="10" fill="#5A9A3A" opacity="0.85"/>
        <circle cx="350" cy="95" r="12" fill="#7BBF5A" opacity="0.9"/>
        <circle cx="365" cy="103" r="9" fill="#5A9A3A" opacity="0.85"/>
        <circle cx="430" cy="120" r="11" fill="#7BBF5A" opacity="0.9"/>
        <circle cx="445" cy="128" r="9" fill="#6AAA4A" opacity="0.85"/>
        <circle cx="570" cy="140" r="12" fill="#7BBF5A" opacity="0.9"/>
        <circle cx="585" cy="148" r="9" fill="#5A9A3A" opacity="0.85"/>
        <!-- middle area -->
        <circle cx="220" cy="230" r="11" fill="#7BBF5A" opacity="0.85"/>
        <circle cx="235" cy="238" r="8" fill="#5A9A3A" opacity="0.8"/>
        <circle cx="400" cy="210" r="11" fill="#7BBF5A" opacity="0.85"/>
        <circle cx="415" cy="218" r="9" fill="#6AAA4A" opacity="0.8"/>
        <circle cx="620" cy="220" r="10" fill="#7BBF5A" opacity="0.85"/>
        <circle cx="633" cy="228" r="8" fill="#5A9A3A" opacity="0.8"/>
        <!-- lower area -->
        <circle cx="290" cy="380" r="10" fill="#7BBF5A" opacity="0.85"/>
        <circle cx="305" cy="388" r="8" fill="#5A9A3A" opacity="0.8"/>
        <circle cx="500" cy="420" r="11" fill="#7BBF5A" opacity="0.85"/>
        <circle cx="515" cy="427" r="8" fill="#5A9A3A" opacity="0.8"/>
        <circle cx="650" cy="380" r="10" fill="#7BBF5A" opacity="0.85"/>
        <circle cx="663" cy="388" r="8" fill="#5A9A3A" opacity="0.8"/>
      </g>

      <!-- ======= FOOD / DECORATIVE ITEMS (like reference) ======= -->
      <!-- pizza slice top right -->
      <g transform="translate(530,70) rotate(-20)" opacity="0.9">
        <polygon points="0,-30 22,10 -22,10" fill="#E8C068"/>
        <circle cx="0" cy="-5" r="4" fill="#CE2B37"/>
        <circle cx="8" cy="3" r="3" fill="#009246"/>
        <circle cx="-8" cy="2" r="3" fill="#CE2B37"/>
      </g>
      <!-- gelato bottom right -->

      {ita:"Posso pagare in contanti?", eng:"Can I pay in cash?",       emoji:"💵", pron:"pos-so pa-ga-reh in kon-tan-tee"},
    ]},
  croce:   { name:"Santa Croce", emoji:"⛪", desc:"A Gothic church full of famous Florentines!", color:"#7BBF5A",
    phrases:[
      {ita:"Buongiorno! Come stai?",    eng:"Good morning! How are you?",emoji:"☀️", pron:"bwon-jor-no ko-meh sty"},
      {ita:"Sto bene, grazie!",         eng:"I'm well, thank you!",     emoji:"😄", pron:"sto beh-neh, grat-see-eh"},
      {ita:"Come ti chiami?",           eng:"What is your name?",       emoji:"👤", pron:"ko-meh tee kya-mee"},
      {ita:"Mi chiamo…",                eng:"My name is…",              emoji:"🙋", pron:"mee kya-mo"},
    ]},
  pitti:   { name:"Palazzo Pitti", emoji:"🏛️", desc:"A massive Renaissance palace full of treasures!", color:"#9B59B6",
    phrases:[
      {ita:"Un tavolo per due, per favore",eng:"A table for two, please", emoji:"🍽️", pron:"oon ta-vo-lo pair doo-eh"},
      {ita:"Il conto, per favore",      eng:"The bill, please",         emoji:"🧾", pron:"eel kon-to, pair fa-vo-reh"},
      {ita:"È delizioso!",              eng:"It's delicious!",          emoji:"😋", pron:"eh deh-lee-tsyo-zo"},
      {ita:"Sono allergico/a a…",       eng:"I'm allergic to…",        emoji:"⚠️", pron:"so-no al-lair-jee-ko/a a"},
    ]},
  spirito: { name:"Santo Spirito", emoji:"🕊️", desc:"A peaceful Renaissance church in Oltrarno!", color:"#009246",
    phrases:[
      {ita:"Che vista meravigliosa!",   eng:"What a wonderful view!",   emoji:"😍", pron:"keh vees-ta meh-ra-vil-yo-za"},
      {ita:"Quanto è lontano?",         eng:"How far is it?",           emoji:"📏", pron:"kwan-to eh lon-ta-no"},
      {ita:"Posso sedermi qui?",        eng:"Can I sit here?",          emoji:"🪑", pron:"pos-so seh-dair-mee kwee"},
      {ita:"Avete una mappa?",          eng:"Do you have a map?",       emoji:"🗺️", pron:"a-veh-teh oo-na map-pa"},
    ]},
};

// ===================================================
// STATE
// ===================================================
let S = {
  city: 'rome',
  stars: 0,
  learned: {},       // id -> Set of indices
  quizDone: new Set(),
  quizState: null,   // {id, shuffled, qIdx, answered, correct, wrongPick}
  openId: null,
};

// ===================================================
// SPEECH
// ===================================================
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'it-IT'; u.rate = 0.82; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

// ===================================================
// INTRO
// ===================================================
function startApp() {
  document.getElementById('intro').classList.add('gone');
  setTimeout(()=>document.getElementById('intro').remove(), 700);
}

// ===================================================
// CITY SWITCH
// ===================================================
function switchCity(c) {
  S.city = c;
  S.openId = null;
  document.getElementById('view-rome').classList.toggle('hidden', c!=='rome');
  document.getElementById('view-florence').classList.toggle('hidden', c!=='florence');
  document.getElementById('tab-rome').className = 'city-tab'+(c==='rome'?' active':'');
  document.getElementById('tab-florence').className = 'city-tab'+(c==='florence'?' active':'');
  closePanel(c==='rome'?'florence':'rome');
}

// ===================================================
// PANEL
// ===================================================
function openPanel(id) {
  S.openId = id;
  const city = S.city;
  const data = city==='rome' ? ROME[id] : FLORENCE[id];
  if (!S.learned[id]) S.learned[id] = new Set();

  // Reset quiz state if switching landmark
  if (!S.quizState || S.quizState.id !== id) S.quizState = null;

  const bodyEl = document.getElementById('panel-'+city+'-body');
  bodyEl.innerHTML = buildContent(id, data, city);

  document.getElementById('backdrop-'+city).classList.add('open');
  document.getElementById('panel-'+city).classList.add('open');
}

function closePanel(city) {
  document.getElementById('backdrop-'+city).classList.remove('open');
  document.getElementById('panel-'+city).classList.remove('open');
}

function buildContent(id, data, city) {
  const isRome = city === 'rome';
  const items = isRome ? data.words : data.phrases;
  const learned = S.learned[id] || new Set();
  const allLearned = learned.size >= items.length;

  const tilesHtml = items.map((item, i) => {
    const isDone = learned.has(i);
    const safeIta = item.ita.replace(/'/g, "\\'").replace(/"/g, "&quot;");
    if (!isRome) {
      return `<div class="word-tile phrase-tile${isDone?' learned':''}" onclick="learnItem('${id}',${i})">
        <span class="tile-emoji">${item.emoji}</span>
        <div class="tile-info">
          <span class="tile-ita">${item.ita}</span>
          <span class="tile-eng">${item.eng}</span>
          <span class="tile-pron">Say: "${item.pron}"</span>
          <button class="tile-hear" onclick="event.stopPropagation();speak('${safeIta}')">🔊 Listen</button>
        </div>
      </div>`;
    }
    return `<div class="word-tile${isDone?' learned':''}" onclick="learnItem('${id}',${i})">
      <span class="tile-emoji">${item.emoji}</span>
      <span class="tile-ita">${item.ita}</span>
      <span class="tile-eng">${item.eng}</span>
      <span class="tile-pron">Say: "${item.pron}"</span>
      <button class="tile-hear" onclick="event.stopPropagation();speak('${safeIta}')">🔊 Listen</button>
    </div>`;
  }).join('');

  const quizSection = allLearned
    ? buildQuizSection(id, data, city)
    : `<div class="progress-hint">Tap all ${items.length} ${isRome?'words':'phrases'} to unlock the quiz! (${learned.size}/${items.length} done) 🎯</div>`;

  return `
    <div class="panel-header">
      <span class="panel-icon">${data.emoji}</span>
      <div>
        <div class="panel-name" style="color:${data.color}">${data.name}</div>
        <div class="panel-desc">${data.desc}</div>
      </div>
    </div>
    <div class="words-grid">${tilesHtml}</div>
    ${quizSection}`;
}

function buildQuizSection(id, data, city) {
  const isRome = city === 'rome';
  const items = isRome ? data.words : data.phrases;

  // init quiz state
  if (!S.quizState || S.quizState.id !== id) {
    S.quizState = { id, shuffled:[...items].sort(()=>Math.random()-0.5), qIdx:0, answered:false, correct:null, wrongPick:null };
  }
  const q = S.quizState;

  // Quiz complete
  if (q.qIdx >= q.shuffled.length) {
    if (!S.quizDone.has(id)) {
      S.quizDone.add(id);
      addStars(3);
      const pin = document.getElementById('hit-'+id);
      if (pin) pin.classList.add('done');
      updateHeader();
    }
    return `<div class="quiz-done">
      <div style="font-size:2.5em">🏆</div>
      <h3>Bravissimo! Quiz Complete!</h3>
      <div class="star-row">⭐⭐⭐</div>
      <p style="color:#8A6040;font-weight:700;font-size:0.9em">You earned 3 bonus stars!</p>
      <button class="quiz-next" onclick="resetQuiz('${id}')" style="margin-top:10px;background:#C89020;">🔁 Play Again</button>
    </div>`;
  }

  const word = q.shuffled[q.qIdx];
  const quizType = Math.random() > 0.5 ? 'ita' : 'eng';
  const qText = quizType === 'ita'
    ? `What does "<strong>${word.ita}</strong>" mean?`
    : `How do you say "<strong>${word.eng}</strong>" in Italian?`;

  const others = items.filter(w=>w.ita!==word.ita).sort(()=>Math.random()-0.5).slice(0,3);
  const opts = [...others, word].sort(()=>Math.random()-0.5);

  const optsHtml = opts.map(opt=>{
    const label = quizType === 'ita' ? opt.eng : opt.ita;
    const isCorrect = opt.ita === word.ita;
    let cls = 'quiz-opt';
    if (q.answered) {
      if (isCorrect) cls += ' opt-ok';
      else if (q.wrongPick === opt.ita) cls += ' opt-no';
    }
    const safeIta = opt.ita.replace(/'/g,"\\'");
    return `<button class="${cls}" ${q.answered?'disabled':''}
      onclick="answerQuiz('${id}',${isCorrect},'${word.ita.replace(/'/g,"\\'")}','${safeIta}')">
      ${label}</button>`;
  }).join('');

  let feedback = '';
  if (q.answered) {
    feedback = q.correct
      ? `<div class="quiz-fb ok">🎉 Esatto! That's right! ⭐</div>`
      : `<div class="quiz-fb no">😅 Not quite — <strong>${word.ita}</strong> means <strong>${word.eng}</strong></div>`;
  }
  const nextLabel = q.qIdx < q.shuffled.length-1 ? 'Next →' : '🏆 Finish!';

  return `<div class="quiz-box">
    <h3>🎮 Quiz Time! (${q.qIdx+1}/${q.shuffled.length})</h3>
    <div class="quiz-q">
      <span class="quiz-q-emoji">${word.emoji}</span>
      <div class="quiz-q-text">${qText}</div>
      ${quizType==='eng'?`<div class="quiz-q-hint"><button class="tile-hear" onclick="speak('${word.ita.replace(/'/g,"\\'")}')">🔊 Hear it</button></div>`:''}
    </div>
    <div class="quiz-opts">${optsHtml}</div>
    ${feedback}
    ${q.answered?`<button class="quiz-next" onclick="nextQuiz('${id}')">${nextLabel}</button>`:''}
  </div>`;
}

// ===================================================
// LEARN
// ===================================================
function learnItem(id, idx) {
  const city = S.city;
  const data = city==='rome' ? ROME[id] : FLORENCE[id];
  const items = city==='rome' ? data.words : data.phrases;
  speak(items[idx].ita);
  if (!S.learned[id]) S.learned[id] = new Set();
  const isNew = !S.learned[id].has(idx);
  S.learned[id].add(idx);
  if (isNew) { addStars(1); burstStar(); }
  refreshPanel(id);
}

function answerQuiz(id, isCorrect, ita, picked) {
  if (!S.quizState || S.quizState.answered) return;
  S.quizState.answered = true;
  S.quizState.correct = isCorrect;
  S.quizState.wrongPick = isCorrect ? null : picked;
  if (isCorrect) { addStars(1); burstStar(); speak(ita); }
  else speak("Riprova!");
  refreshPanel(id);
}

function nextQuiz(id) {
  if (!S.quizState) return;
  S.quizState.qIdx++;
  S.quizState.answered = false;
  S.quizState.correct = null;
  S.quizState.wrongPick = null;
  refreshPanel(id);
}

function resetQuiz(id) {
  S.quizState = null;
  refreshPanel(id);
}

function refreshPanel(id) {
  const city = S.city;
  const data = city==='rome' ? ROME[id] : FLORENCE[id];
  document.getElementById('panel-'+city+'-body').innerHTML = buildContent(id, data, city);
}

// ===================================================
// STARS
// ===================================================
function addStars(n) {
  S.stars += n;
  updateHeader();
}
function updateHeader() {
  document.getElementById('star-count').textContent = S.stars;
  document.getElementById('done-count').textContent = S.quizDone.size + '/' + (Object.keys(ROME).length + Object.keys(FLORENCE).length);
}
function burstStar() {
  const el = document.createElement('div');
  el.className = 'starburst';
  el.textContent = '⭐';
  el.style.left = (50 + Math.random()*160)+'px';
  el.style.top = '54px';
  const root = document.getElementById('app-root') || document.body;
  root.appendChild(el);
  setTimeout(()=>el.remove(), 950);
}

updateHeader();

// ===================================================
// RESPONSIVE SCALING
// Uses CSS transform: scale() to uniformly scale the
// entire #app-root to fill the browser window.
// Works on desktop, tablet, and mobile.
// ===================================================
const APP_W = 800;  // SVG viewBox / design width
const APP_H = 580;  // total design height

function scaleApp() {
  const root = document.getElementById('app-root');
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Find scale that makes the app fill the viewport (fit, not fill)
  const scale = Math.min(vw / APP_W, vh / APP_H);

  // Set root to design size, then scale it up/down
  root.style.width  = APP_W + 'px';
  root.style.height = APP_H + 'px';
  root.style.transformOrigin = 'top left';
  root.style.transform = `scale(${scale})`;
  root.style.overflow = 'hidden';

  // Size the body to the scaled dimensions so there's no dead space
  const scaledW = Math.round(APP_W * scale);
  const scaledH = Math.round(APP_H * scale);
  document.body.style.width  = scaledW + 'px';
  document.body.style.height = scaledH + 'px';
  document.body.style.overflow = 'hidden';

  // Center horizontally and vertically
  root.style.marginLeft = Math.max(0, Math.floor((vw - scaledW) / 2)) + 'px';
  root.style.marginTop  = Math.max(0, Math.floor((vh - scaledH) / 2)) + 'px';

  // Cap panel max-height to ~78% of the design-space map area (below header+tabs)
  // Header=50px, tabs=40px => map area = APP_H - 90. Panel gets 78% of that.
  const mapH = APP_H - 90;
  const panelMaxH = Math.floor(mapH * 0.82);
  document.querySelectorAll('.landmark-panel').forEach(p => {
    p.style.maxHeight = panelMaxH + 'px';
  });
}

window.addEventListener('resize', scaleApp);
scaleApp();
</script>
